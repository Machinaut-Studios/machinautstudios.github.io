<!-- Source for tooter-og.png (1200x1200 social/OG share image).
     Regenerate: embed tooter_logo_transparent.png as a base64 data URI in an
     <image> (qlmanage does not reliably load relative external images), then
     rasterize, e.g.:  qlmanage -t -s 1200 -o <dir> <this-svg-with-datauri> -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse"><rect width="6" height="3" fill="#000000"/></pattern>
  </defs>
  <rect width="1200" height="1200" fill="#2B2A24"/>
  <rect x="28" y="28" width="1144" height="1144" fill="none" stroke="#8A8366" stroke-width="3"/>
  <rect width="1200" height="1200" fill="url(#scan)" opacity="0.10"/>
  <image xlink:href="tooter_logo_transparent.png" x="320" y="105" width="560" height="575"/>
  <g font-family="'Courier New', monospace" text-anchor="middle">
    <text x="600" y="775" font-size="44" font-weight="700" fill="#D8CCA8">Record. Rate. Repeat.</text>
    <text x="600" y="845" font-size="34" fill="#D8CCA8">The flatulence archive</text>
    <text x="600" y="891" font-size="34" fill="#D8CCA8">you didn't know you needed.</text>
    <text x="600" y="1000" font-size="30" font-weight="700" fill="#FF7A3C">NOW ON THE APP STORE &amp; GOOGLE PLAY</text>
    <text x="600" y="1110" font-size="24" fill="#8A8366">MACHINAUT STUDIOS LLC // TERMINAL BEIGE DIVISION</text>
  </g>
</svg>
